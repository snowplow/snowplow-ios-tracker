name: Build

on: [push]

jobs:
  podspec:
    name: Lint Podspec for ${{ matrix.platform }}
    runs-on: macos-15
    strategy:
      matrix:
        platform: [ios, osx, tvos, watchos]
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"
      - uses: actions/checkout@v4
      - name: Lint Podspec
        run: pod lib lint --platforms=${{ matrix.platform }}

  test_framework:
    name: ${{ matrix.name }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Integration (iOS, Xcode 16.4)"
            destination: "platform=iOS Simulator,name=iPhone 16,OS=18.5"
            target: IntegrationTests

          - name: "Unit (iOS, Xcode 16.4)"
            destination: "platform=iOS Simulator,name=iPhone 16,OS=18.5"
            target: Tests

          - name: "Unit (macOS, Xcode 16.4)"
            destination: "platform=macOS"
            target: Tests

          - name: "Unit (watchOS, Xcode 16.4)"
            destination: "platform=watchOS Simulator,name=Apple Watch Series 10 (46mm),OS=11.5"
            target: Tests

          - name: "Unit (tvOS, Xcode 16.4)"
            destination: "platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=18.5"
            target: Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -- Micro --
      - name: Cache Micro
        id: cache-micro
        uses: actions/cache@v4
        with:
          path: micro.jar
          key: ${{ runner.os }}-micro

      - name: Get micro
        if: steps.cache-micro.outputs.cache-hit != 'true' && matrix.target == 'IntegrationTests'
        run: curl -o micro.jar -L https://github.com/snowplow-incubator/snowplow-micro/releases/download/micro-1.7.0/snowplow-micro-1.7.0.jar

      - name: Run Micro in background
        if: matrix.target == 'IntegrationTests'
        run: java -jar micro.jar &

      - name: Wait on Micro endpoint
        if: matrix.target == 'IntegrationTests'
        timeout-minutes: 2
        run: while ! nc -z '0.0.0.0' 9090; do sleep 1; done
      # -- Micro --

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Build & Test
        run: |
          set -o pipefail && xcodebuild \
            -scheme SnowplowTracker \
            -destination "${{ matrix.destination }}" \
            -only-testing ${{ matrix.target }} \
            clean test | xcpretty

  build_objc_demo_app:
    name: "ObjC demo (iOS ${{ matrix.version.ios }})"
    needs: test_framework
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.version.xcode }}.app/Contents/Developer

    strategy:
      fail-fast: false
      matrix:
        version:
          - {
              ios: "18.5",
              iphone: iPhone 16,
              watchos: "11.5",
              watch: Apple Watch Series 10 (46mm),
              xcode: "16.4",
            }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build
        env:
          IOS: ${{ matrix.version.ios }}
          WATCHOS: ${{ matrix.version.watchos }}
          IPHONE: ${{ matrix.version.iphone }}
          WATCH: ${{ matrix.version.watch }}
        run: |
          cd Examples/demo/
          . .scripts/setup.sh
          .scripts/test_ios_demo.sh -app SnowplowObjCDemo -podfile Podfile -ios "${BUILD_WORKSPACE_OBJC_DEMO}" "${BUILD_DEST_IOS}" "${BUILD_SCHEME_OBJC_DEMO}"

  build_swift_cocoapods_demo_app:
    name: "Swift demo (Cocoapods) (iOS ${{ matrix.version.ios }})"
    needs: test_framework
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.version.xcode }}.app/Contents/Developer

    strategy:
      fail-fast: false
      matrix:
        version:
          - {
              ios: "18.5",
              iphone: iPhone 16,
              watchos: "11.5",
              watch: Apple Watch Series 10 (46mm),
              xcode: "16.4",
            }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build
        env:
          IOS: ${{ matrix.version.ios }}
          WATCHOS: ${{ matrix.version.watchos }}
          IPHONE: ${{ matrix.version.iphone }}
          WATCH: ${{ matrix.version.watch }}
        run: |
          cd Examples/demo/
          . .scripts/setup.sh
          .scripts/test_ios_demo.sh -app SnowplowSwiftCocoapodsDemo -podfile Podfile -ios "${BUILD_WORKSPACE_SWIFT_DEMO}" "${BUILD_DEST_IOS}" "${BUILD_SCHEME_SWIFT_DEMO_IOS}" -watch "${BUILD_DEST_PAIRED}" "${BUILD_SCHEME_SWIFT_DEMO_WATCH}"

  build_swift_spm_demo_app:
    name: "Swift demo (SPM) (iOS ${{ matrix.version.ios }})"
    needs: test_framework
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.version.xcode }}.app/Contents/Developer

    strategy:
      fail-fast: false
      matrix:
        version:
          - {
              ios: "18.5",
              iphone: iPhone 16,
              watchos: "11.5",
              watch: Apple Watch Series 10 (46mm),
              xcode: "16.4",
            }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get branch name
        id: branch
        run: |
          # Set git branch or git tag as slug
          if [[ ${GITHUB_REF} =~ ^refs\/tags\/ ]]; then
            GIT_BRANCH=master
          else
            if [ -n "${GITHUB_HEAD_REF}" ]; then
              GIT_BRANCH="${GITHUB_HEAD_REF}"
            else
              GIT_BRANCH="${GITHUB_REF/refs\/heads\//}"
            fi
          fi
          echo "name=${GIT_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          IOS: ${{ matrix.version.ios }}
          WATCHOS: ${{ matrix.version.watchos }}
          IPHONE: ${{ matrix.version.iphone }}
          WATCH: ${{ matrix.version.watch }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          cd Examples/demo/
          . .scripts/setup.sh
          .scripts/test_ios_demo.sh -app SnowplowSwiftSPMDemo -spm ${BRANCH} -ios "${BUILD_WORKSPACE_SWIFT_SPM_DEMO}" "${BUILD_DEST_IOS}" "${BUILD_SCHEME_SWIFT_SPM_DEMO_IOS}"

  build_iglu_central_app:
    name: "Iglu Central (SPM) (iOS ${{ matrix.version.ios }})"
    needs: test_framework
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.version.xcode }}.app/Contents/Developer

    strategy:
      fail-fast: false
      matrix:
        version:
          - { ios: "18.5", iphone: iPhone 16, xcode: "16.4" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build
        env:
          IOS: ${{ matrix.version.ios }}
          IPHONE: ${{ matrix.version.iphone }}
        run: |
          cd Examples/demo/
          . .scripts/setup.sh
          .scripts/test_ios_demo.sh -app IgluCentral -ios "${BUILD_WORKSPACE_IGLU_CENTRAL}" "${BUILD_DEST_IOS}" "${BUILD_SCHEME_IGLU_CENTRAL_IOS}"
